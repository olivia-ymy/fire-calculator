<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE з’Ғпј„з•»йҚЈ?- з’җгҲ е§ҹй‘·оҒҶж•ұз’Ғпј„з•»йҚЈ?/title>
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-light: #40916c;
      --accent: #d4a373;
      --bg: #fefae0;
      --card: #ffffff;
      --text: #1b4332;
      --text-light: #52796f;
      --border: #d4a37340;
      --danger: #c1121f;
      --success: #2d6a4f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
    header p { color: var(--text-light); font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card h2 { font-size: 1rem; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.3rem; }
    .form-group input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .form-group .hint { font-size: 0.75rem; color: var(--text-light); margin-top: 0.2rem; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .result-item { text-align: center; padding: 1rem; background: var(--bg); border-radius: 10px; }
    .result-item .number { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .result-item .label { font-size: 0.8rem; color: var(--text-light); margin-top: 0.2rem; }
    .result-item.highlight { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
    .result-item.highlight .number { color: white; }
    .result-item.highlight .label { color: rgba(255,255,255,0.8); }
    .result-item.danger .number { color: var(--danger); }
    #chart-container { width: 100%; height: 300px; margin-top: 1rem; }
    .progress-bar-wrap { background: var(--bg); border-radius: 8px; height: 24px; overflow: hidden; margin-top: 1rem; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 8px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem; font-weight: 600; }
    .milestones { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .milestone { padding: 0.3rem 0.7rem; background: var(--bg); border-radius: 20px; font-size: 0.75rem; color: var(--text-light); border: 1px solid var(--border); }
    .milestone.active { background: var(--primary); color: white; border-color: var(--primary); }
    .scenario-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .scenario-tab { padding: 0.4rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .scenario-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .sensitivity { margin-top: 1rem; }
    .sensitivity-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .sensitivity-row:last-child { border-bottom: none; }
    .sensitivity-row span { color: var(--text-light); }
    .sensitivity-row strong { color: var(--primary); }
    footer { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--text-light); font-size: 0.8rem; }
    .fire-target-display { text-align: center; padding: 1.5rem; background: linear-gradient(135deg, #2d6a4f10, #d4a37310); border-radius: 12px; margin-top: 1rem; }
    .fire-target-display .amount { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .fire-target-display .desc { font-size: 0.85rem; color: var(--text-light); margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>йҰғж•ҹ FIRE з’Ғпј„з•»йҚЈ?/h1>
      <p>Financial Independence, Retire Early йҲҘ?з’Ғпј„з•»жөЈзҠөж®‘з’җгҲ е§ҹй‘·оҒҶж•ұж¶”е¬ӯзҹҫ</p>
    </header>

    <div class="grid">
      <!-- е®ёпёҝжҷ¶й”ӣж°із·ӯйҚҸ?-->
      <div class="card">
        <h2>йҰғж‘ң йҚ©зғҳж№°ж·Үв„ғдј…</h2>
        <div class="form-group">
          <label>иӨ°ж’іеў йҺ¬иҜІз“ЁеЁҶ?/ з’§еӢӘйӘҮй”ӣеҹӘгғҜзҙҡ</label>
          <input type="number" id="currentSavings" value="500000" min="0" step="10000">
        </div>
        <div class="form-group">
          <label>йӘһеӯҳж•№йҚҸгғҜзҙҷжҘјй”ӣ?/label>
          <input type="number" id="annualIncome" value="300000" min="0" step="10000">
        </div>
        <div class="form-group">
          <label>йӘһеӯҳж•®йҚ‘зҢҙзҙҷжҘјй”ӣ?/label>
          <input type="number" id="annualExpense" value="150000" min="0" step="10000">
        </div>
        <div class="form-group">
          <label>жЈ°еӢ¬ж№ЎйӘһеӯҳе§Үз’§еӢ¬ж•№йҗ©е©„е·јй”ӣ?й”ӣ?/label>
          <input type="number" id="returnRate" value="7" min="0" max="30" step="0.5">
          <div class="hint">еҜӨйёҝоҶ…жөЈи·Ёж•Ө 4%~7%й”ӣеұјз®°з‘ҷ?10%й”ӣеұјз№ҡзҖ№?4%</div>
        </div>
        <div class="form-group">
          <label>FIRE йҗ©оҶҪзҲЈйҚҠе¶Үе·ј</label>
          <input type="number" id="fireMultiple" value="25" min="10" max="50" step="1">
          <div class="hint">й–«ж°¬зҲ¶ж¶“е“„еӢҫйҸҖоҲҡеҡӯйҗЁ?25 йҚҠе¶ҸзҙҷзҖөз‘°з°І 4% йҺ»ж„¬еҪҮз‘ҷеӢ«еһҜй”ӣ?/div>
        </div>
        <div class="form-group">
          <label>й–«ж°іжҸЈй‘¶г„Ёе„үйҗңеӣ·зҙҷ%й”ӣеӨӣзҙҷйҚҷоҲһвӮ¬еӨӣзҙҡ</label>
          <input type="number" id="inflation" value="3" min="0" max="10" step="0.5">
        </div>
      </div>

      <!-- йҚҷе……жҷ¶й”ӣж°ұзІЁйҸӢ?-->
      <div class="card">
        <h2>йҰғжҗі FIRE йҗ©оҶҪзҲЈ</h2>
        <div class="fire-target-display">
          <div class="amount" id="fireNumber">жҘј3,750,000</div>
          <div class="desc">FIRE йҺөвӮ¬й—ҮвӮ¬йҸҲо„„еҷҫ</div>
        </div>

        <div class="result-grid" style="margin-top: 1.5rem;">
          <div class="result-item highlight">
            <div class="number" id="fireYears">10.2</div>
            <div class="label">йӘһзЈӢжҸӘйҺҙ?FIRE</div>
          </div>
          <div class="result-item">
            <div class="number" id="monthlySavings">жҘј12,500</div>
            <div class="label">е§Јеҝ”ж№Җй—ҮвӮ¬йҚҢг„Ёжҗ«</div>
          </div>
          <div class="result-item">
            <div class="number" id="savingsRate">50%</div>
            <div class="label">йҚҢг„Ёжҗ«йҗң?/div>
          </div>
          <div class="result-item">
            <div class="number" id="yearlyInvest">жҘј150,000</div>
            <div class="label">е§Јеҝ“еӢҫйҺ¶жӣһеҸҶ</div>
          </div>
        </div>

        <label style="font-size:0.85rem;color:var(--text-light);">иӨ°ж’іеў жқ©ж¶ҳе®і</label>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar" style="width: 13.3%;">13.3%</div>
        </div>

        <div class="milestones" id="milestones">
          <div class="milestone">0%</div>
          <div class="milestone">25%</div>
          <div class="milestone">50%</div>
          <div class="milestone">75%</div>
          <div class="milestone">100%</div>
        </div>
      </div>
    </div>

    <!-- йҚҘжҚҗгҖғ -->
    <div class="card" style="margin-top: 1.5rem;">
      <h2>йҰғжҗұ з’§еӢӘйӘҮжҫ§зӮәжҡұйҸҮиҢ¬еҡҺ</h2>
      <div class="scenario-tabs">
        <button class="scenario-tab active" data-scenario="base">ж·ҮжҝҶз•§</button>
        <button class="scenario-tab" data-scenario="optimistic">ж¶”ж„ҜоқҮ</button>
        <button class="scenario-tab" data-scenario="pessimistic">йҸӢдҪәоҒ¬ж·ҮжҝҶз•§</button>
      </div>
      <div id="chart-container">
        <canvas id="chart" style="width:100%;height:300px;"></canvas>
      </div>
    </div>

    <!-- йҸҒеҝ”еҠ…жҗҙп№ҖеһҺйҸӢ?-->
    <div class="card" style="margin-top: 1.5rem;">
      <h2>йҰғж”ў йҸҒеҝ”еҠ…жҗҙп№ҖеһҺйҸӢ?йҲҘ?йҚҡеӢ«жҙңз»ұзҠІоҮ® FIRE йӘһеӯҳжҡҹйҗЁеӢ«еҘ–йҚқ?/h2>
      <div class="sensitivity" id="sensitivity"></div>
    </div>

    <footer>
      Made with йүӮгӮҸз¬Қ by Olivia и·Ҝ FIRE з’Ғпј„з•»йҚЈ?и·Ҝ йҸҒзүҲеөҒжө е‘ӯз“ЁйҚҢг„Ҙж№ӘйҸҲо„Җж№ҙеЁҙеҝҡоқҚйҚЈ?    </footer>
  </div>

  <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.js">
  <script>
    const el = (id) => document.getElementById(id);
    let chart;

    function formatMoney(n) {
      if (n >= 100000000) return 'жҘј' + (n / 100000000).toFixed(1) + 'жөң?;
      if (n >= 10000) return 'жҘј' + (n / 10000).toFixed(0) + 'ж¶“?;
      return 'жҘј' + n.toFixed(0);
    }

    function formatYear(year) {
      const d = new Date();
      const targetYear = d.getFullYear() + year;
      return `${targetYear} йӘһзў»;
    }

    function calc({ savings, income, expense, rate, multiple, inflation = 0 }) {
      const fireTarget = expense * multiple;
      const realRate = (1 + rate / 100) / (1 + inflation / 100) - 1;
      const annualSavings = income - expense;
      const yearlyInvest = annualSavings;

      let year = 0;
      let balance = savings;
      const path = [{ year: 0, balance: savings }];

      while (balance < fireTarget && year < 100) {
        year++;
        balance = balance * (1 + realRate) + yearlyInvest;
        path.push({ year, balance });
      }

      // Binary search for exact year
      let lo = year - 1, hi = year;
      if (hi === 0) hi = 1;
      while (hi < 100 && balance < fireTarget) {
        hi++;
        balance = (savings + yearlyInvest / realRate) * Math.pow(1 + realRate, hi) - yearlyInvest / realRate;
      }
      const exactYear = year === 0 ? 0 : lo + (fireTarget - path[lo].balance) / (path[year] ? path[year].balance - path[lo].balance : yearlyInvest);

      return {
        fireTarget,
        years: year === 0 ? 0 : exactYear,
        yearlyInvest,
        monthlyInvest: yearlyInvest / 12,
        savingsRate: (annualSavings / income * 100).toFixed(0),
        path,
        fireReached: year < 100
      };
    }

    function update() {
      const savings = parseFloat(el('currentSavings').value) || 0;
      const income = parseFloat(el('annualIncome').value) || 0;
      const expense = parseFloat(el('annualExpense').value) || 0;
      const rate = parseFloat(el('returnRate').value) || 0;
      const multiple = parseFloat(el('fireMultiple').value) || 25;
      const inflation = parseFloat(el('inflation').value) || 0;

      const r = calc({ savings, income, expense, rate, multiple, inflation });

      el('fireNumber').textContent = formatMoney(r.fireTarget);
      el('fireYears').textContent = r.years === 0 ? 'е®ёиҢ¶жҸӘйҺҙ? : r.years.toFixed(1) + 'йӘһ?;
      el('monthlySavings').textContent = formatMoney(r.monthlyInvest);
      el('savingsRate').textContent = r.savingsRate + '%';
      el('yearlyInvest').textContent = formatMoney(r.yearlyInvest);

      const progress = Math.min(100, savings / r.fireTarget * 100);
      el('progressBar').style.width = progress.toFixed(1) + '%';
      el('progressBar').textContent = progress.toFixed(1) + '%';

      // Update milestones
      const milestones = el('milestones').children;
      for (let i = 0; i < milestones.length; i++) {
        const threshold = parseInt(milestones[i].textContent);
        milestones[i].classList.toggle('active', progress >= threshold);
      }

      // Sensitivity
      const scenarios = [
        { label: 'йҺ»ж„°зҸ®йҸҖеүҒжіӯйҗң?+2%', rate: rate + 2 },
        { label: 'й—„е¶„з¶ҶйҸҖеүҒжіӯйҗң?-2%', rate: rate - 2 },
        { label: 'йӘһеӯҳж•®йҚ‘?-10%', expense: expense * 0.9 },
        { label: 'йӘһеӯҳж•®йҚ‘?+10%', expense: expense * 1.1 },
        { label: 'йҸҖи·әеҸҶ +20%', income: income * 1.2 },
      ];
      el('sensitivity').innerHTML = scenarios.map(s => {
        const res = calc({ savings, income: s.income || income, expense: s.expense || expense, rate: s.rate || rate, multiple, inflation });
        const diff = res.years - r.years;
        const diffStr = diff > 0 ? '+' + diff.toFixed(1) : diff < 0 ? diff.toFixed(1) : '0';
        return `<div class="sensitivity-row"><span>${s.label}</span><strong>${res.years === 0 ? 'е®ёиҢ¶жҸӘйҺҙ? : res.years.toFixed(1) + ' йӘһ?} <span style="color:var(--text-light);font-size:0.75rem;">(${diffStr})</span></strong></div>`;
      }).join('');

      updateChart(r);
    }

    function updateChart(data) {
      const ctx = el('chart').getContext('2d');

      const scenarios = {
        base: { rate: parseFloat(el('returnRate').value) || 7, label: 'ж·ҮжҝҶз•§ (7%)', color: '#2d6a4f' },
        optimistic: { rate: (parseFloat(el('returnRate').value) || 7) + 3, label: 'ж¶”ж„ҜоқҮ (+3%)', color: '#d4a373' },
        pessimistic: { rate: (parseFloat(el('returnRate').value) || 7) - 3, label: 'йҸӢдҪәоҒ¬ж·ҮжҝҶз•§ (-3%)', color: '#c1121f' }
      };

      const activeTab = document.querySelector('.scenario-tab.active').dataset.scenario;
      const scenario = scenarios[activeTab];

      const inflation = parseFloat(el('inflation').value) || 0;
      const income = parseFloat(el('annualIncome').value) || 0;
      const expense = parseFloat(el('annualExpense').value) || 0;
      const savings = parseFloat(el('currentSavings').value) || 0;
      const multiple = parseFloat(el('fireMultiple').value) || 25;

      const r = calc({ savings, income, expense, rate: scenario.rate, multiple, inflation });
      const fireTarget = r.fireTarget;

      if (chart) chart.destroy();

      const labels = r.path.map(p => formatYear(p.year));
      const values = r.path.map(p => p.balance);

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'з’§еӢӘйӘҮ',
              data: values,
              borderColor: scenario.color,
              backgroundColor: scenario.color + '20',
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 5
            },
            {
              label: 'FIRE йҗ©оҶҪзҲЈ',
              data: new Array(values.length).fill(fireTarget),
              borderColor: '#d4a373',
              borderDash: [5, 5],
              fill: false,
              pointRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw)
              }
            }
          },
          scales: {
            x: { title: { display: true, text: 'йӘһзҝ е”Ө' } },
            y: {
              title: { display: true, text: 'з’§еӢӘйӘҮй”ӣеҹӘгғҜзҙҡ' },
              ticks: { callback: (v) => formatMoney(v) }
            }
          }
        }
      });
    }

    // Event listeners
    ['currentSavings', 'annualIncome', 'annualExpense', 'returnRate', 'fireMultiple', 'inflation'].forEach(id => {
      el(id).addEventListener('input', update);
    });

    document.querySelectorAll('.scenario-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        update();
      });
    });

    update();
  </script>
</body>
</html>
